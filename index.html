<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aroma Elite - สัมผัสความเหนือระดับ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050a18">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aroma Elite">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9d976;
            --deep-navy: #050a18;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Prompt', sans-serif; }

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .phone {
            width: 100%;
            max-width: 414px;
            height: 100%;
            max-height: 896px;
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            padding-top: env(safe-area-inset-top); /* สำหรับรอยบาก iPhone */
        }

        @media (min-width: 500px) {
            .phone {
                border-radius: 40px;
                border: 1.5px solid var(--glass-border);
                height: 90vh;
                box-shadow: var(--shadow);
            }
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: absolute;
            inset: 0;
            z-index: 2000;
            background: var(--deep-navy);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .brand-logo {
            font-size: 80px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }

        .login-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 15px;
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
            outline: none;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold), #8a6d3b);
            border: none;
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
        }

        /* --- HEADER --- */
        .header { padding: 30px 30px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header b { color: var(--gold); }

        /* --- CONTENT --- */
        .content { flex: 1; padding: 0 25px; overflow-y: auto; padding-bottom: 100px; }
        .page { display: none; animation: slideUp 0.5s forwards; }
        .page.active { display: block; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* --- BUTTONS --- */
        .spray-main-btn {
            width: 180px; height: 180px;
            border-radius: 50%;
            margin: 30px auto;
            background: radial-gradient(circle, var(--gold-bright), var(--gold));
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            cursor: pointer;
            border: none;
            position: relative;
            transition: transform 0.1s;
        }

        .spray-main-btn.active::after {
            content: ''; position: absolute; inset: -10px;
            border-radius: 50%; border: 2px solid var(--gold);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* --- NAV BAR --- */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%;
            height: 85px; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item { text-align: center; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--gold); }

        .alert {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 8px 25px;
            border-radius: 50px; font-size: 13px; font-weight: 600;
            z-index: 3001; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .switch { width: 50px; height: 26px; position: relative; }
        .switch input { display: none; }
        .slider { position: absolute; inset: 0; background: #333; border-radius: 30px; cursor: pointer; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--gold); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div class="phone">
    <div id="alert" class="alert"></div>

    <div id="login-screen">
        <div class="brand-logo">✨</div>
        <h1 style="margin:0; letter-spacing: 2px;">AROMA ELITE</h1>
        <p style="opacity: 0.5; font-size: 14px; margin-bottom: 20px;">The Art of Fragrance Living</p>
        
        <div style="width: 100%;">
            <input type="text" class="login-input" placeholder="ชื่อผู้ใช้งาน" id="username">
            <input type="password" class="login-input" placeholder="รหัสผ่าน">
            <button class="login-btn" onclick="handleLogin()">เข้าสู่ระบบ</button>
        </div>
        <p id="install-text" style="margin-top:20px; font-size:12px; color:var(--gold); display:none; cursor:pointer;" onclick="installPWA()">📲 ติดตั้งแอปลงเครื่อง</p>
    </div>

    <div class="header">
        <div>
            <h2>สวัสดี, <b id="user-display">คุณสมาชิก</b></h2>
            <p style="margin:0; opacity:0.5; font-size:12px;">🏠 ห้องรับแขก • Online</p>
        </div>
        <div style="font-size: 14px; opacity: 0.6; cursor: pointer;" onclick="logout()">Logout</div>
    </div>

    <div class="content">
        <div id="home" class="page active">
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <h4 style="margin:0;">ระบบพ่นอัตโนมัติ</h4>
                    <p id="status-text" style="margin:0; font-size:13px; color:gray;">ปิดการใช้งาน</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="main-power" onchange="updatePower()">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="spray-main-btn" id="sprayBtn" onclick="triggerSpray()">
                <span style="font-size:45px;">🌬️</span>
                <b style="color:#000; letter-spacing:1px; margin-top:5px;">SPRAY</b>
            </button>

            <div style="display:flex; justify-content:space-around; margin-top:20px;">
                <div style="text-align:center;">
                    <p style="font-size:11px; opacity:0.6; margin:0;">Temp</p>
                    <h3 style="color:var(--gold); margin:5px 0;">25°C</h3>
                </div>
                <div style="text-align:center;">
                    <p style="font-size:11px; opacity:0.6; margin:0;">Humidity</p>
                    <h3 style="color:var(--gold); margin:5px 0;">58%</h3>
                </div>
                <div style="text-align:center;">
                    <p style="font-size:11px; opacity:0.6; margin:0;">Fragrance</p>
                    <h3 id="frag-level" style="color:var(--gold); margin:5px 0;">92%</h3>
                </div>
            </div>
        </div>

        <div id="schedule" class="page">
            <h3 style="margin-bottom:15px;">ตารางการทำงาน</h3>
            <div class="card">
                <input type="time" class="login-input" value="09:00">
                <button class="login-btn" onclick="showAlert('บันทึกเวลาแล้ว')">ยืนยัน</button>
            </div>
        </div>

        <div id="settings" class="page">
            <h3 style="margin-bottom:15px;">ตั้งค่า</h3>
            <div class="card">
                <p style="font-size:14px;">ความแรงพ่น (Intensity)</p>
                <input type="range" style="width:100%; accent-color:var(--gold);" min="1" max="5">
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="changePage(this, 'home')">
            <span style="font-size:24px;">🏠</span><br><span style="font-size:10px;">หน้าหลัก</span>
        </div>
        <div class="nav-item" onclick="changePage(this, 'schedule')">
            <span style="font-size:24px;">📅</span><br><span style="font-size:10px;">ตาราง</span>
        </div>
        <div class="nav-item" onclick="changePage(this, 'settings')">
            <span style="font-size:24px;">⚙️</span><br><span style="font-size:10px;">ตั้งค่า</span>
        </div>
    </div>
</div>

<script>
    // System UI Logic
    function showAlert(msg) {
        const el = document.getElementById('alert');
        el.innerText = msg; el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
    }

    function handleLogin() {
        const user = document.getElementById('username').value || 'Guest';
        document.getElementById('user-display').innerText = 'คุณ' + user;
        const screen = document.getElementById('login-screen');
        screen.style.transform = 'translateY(-100%)';
        setTimeout(() => screen.style.display = 'none', 600);
    }

    function logout() {
        const screen = document.getElementById('login-screen');
        screen.style.display = 'flex';
        setTimeout(() => screen.style.transform = 'translateY(0)', 10);
    }

    function changePage(btn, pageId) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(pageId).classList.add('active');
    }

    // Control Logic
    function updatePower() {
        const isOn = document.getElementById('main-power').checked;
        const txt = document.getElementById('status-text');
        const btn = document.getElementById('sprayBtn');
        txt.innerText = isOn ? 'ระบบพร้อมทำงาน' : 'ปิดการใช้งาน';
        txt.style.color = isOn ? '#d4af37' : 'gray';
        isOn ? btn.classList.add('active') : btn.classList.remove('active');
        showAlert(isOn ? 'เปิดระบบแล้ว' : 'ปิดระบบแล้ว');
    }

    let level = 92;
    function triggerSpray() {
        if(!document.getElementById('main-power').checked) return showAlert('⚠️ กรุณาเปิดระบบ');
        if(level > 0) {
            level--; document.getElementById('frag-level').innerText = level + '%';
            showAlert('✨ กำลังพ่นความหอม...');
            const btn = document.getElementById('sprayBtn');
            btn.style.transform = 'scale(0.9)'; setTimeout(() => btn.style.transform = 'scale(1)', 150);
        }
    }

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('SW Registered'))
                .catch(err => console.log('SW Failed', err));
        });
    }

    // Install Prompt for Android
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); deferredPrompt = e;
        document.getElementById('install-text').style.display = 'block';
    });

    function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(choice => {
                if (choice.outcome === 'accepted') document.getElementById('install-text').style.display = 'none';
            });
        }
    }
</script>

</body>
</html>
